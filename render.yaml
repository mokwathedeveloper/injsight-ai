services:
  - type: web
    name: injsight-ai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # auto-generated secure random string
      - key: OPENROUTER_API_KEY
        sync: false          # set in Render dashboard
      - key: SUPABASE_URL
        value: https://xufsfvdzxbwnudwrojor.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false          # set in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false          # set in Render dashboard
      - key: INJECTIVE_LCD_URL
        value: https://lcd.injective.network
      - key: CORS_ORIGINS
        sync: false          # set after Vercel deploy — add your Vercel URL
